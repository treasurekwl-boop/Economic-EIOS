# Netlify build config. Netlify auto-deploys this repo on every push to main.
# The Supabase env vars (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY) are set in
# the Netlify dashboard → Site configuration → Environment variables (changing
# them triggers a rebuild automatically). If unset, the app falls back to its
# built-in data.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # These are PUBLISHABLE client keys (Supabase URL + anon key). They're meant to
  # ship in the browser bundle, so tell Netlify's secret scanner not to flag them.
  # Never add the service_role/secret key here.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"
